<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warsaw Parties – Resident Advisor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: #161616;
    border-bottom: 1px solid #2a2a2a;
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
  header span { color: #666; font-size: 0.85rem; }
  #total-badge {
    margin-left: auto;
    background: #ff7a00;
    color: #000;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }

  /* SLIDER */
  .slider-section {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px 28px 20px;
    margin-bottom: 24px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .slider-header label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; }
  #range-display { font-size: 1rem; font-weight: 600; color: #ff7a00; }

  .slider-track-wrap {
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
  }

  .slider-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
  }

  .slider-fill {
    position: absolute;
    height: 4px;
    background: #ff7a00;
    border-radius: 2px;
    pointer-events: none;
  }

  input[type=range] {
    position: absolute;
    left: 0; right: 0;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    pointer-events: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #ff7a00;
    cursor: pointer;
    pointer-events: all;
    box-shadow: 0 0 0 3px rgba(255,122,0,0.15);
  }

  input[type=range]::-webkit-slider-runnable-track { background: transparent; }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 0.72rem;
    color: #555;
  }

  /* CHART */
  .chart-section {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 16px;
  }

  #chart-wrap { position: relative; height: 260px; }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .charts-row .chart-section { margin-bottom: 0; }

  #venues-chart-wrap { position: relative; height: 260px; }

  .venues-top-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .venues-top-ctrl label { font-size: 0.75rem; color: #666; }

  .venues-top-ctrl select {
    background: #222;
    border: 1px solid #333;
    border-radius: 5px;
    color: #e0e0e0;
    padding: 3px 8px;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
  }

  /* EVENTS TABLE */
  .events-section {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px 28px;
  }

  .events-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  #search {
    background: #222;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 7px 12px;
    font-size: 0.85rem;
    width: 240px;
    outline: none;
  }

  #search:focus { border-color: #555; }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  thead th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2a2a;
    color: #666;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover { color: #aaa; }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-icon { opacity: 1; color: #ff7a00; }

  tbody tr {
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.1s;
  }

  tbody tr:hover { background: #1c1c1c; }

  td {
    padding: 10px 12px;
    vertical-align: middle;
    max-width: 280px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td.date-col { color: #888; font-variant-numeric: tabular-nums; }
  td.time-col { color: #666; font-size: 0.78rem; }

  td a {
    color: #e0e0e0;
    text-decoration: none;
  }
  td a:hover { color: #ff7a00; }

  .venue-cell { position: relative; display: inline-block; }

  .venue-name {
    cursor: default;
    border-bottom: 1px dashed #444;
    transition: color 0.1s, border-color 0.1s;
  }

  .venue-name:hover { color: #ff7a00; border-color: #ff7a00; }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.8rem;
    max-width: 280px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #tooltip .tt-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 6px; }
  #tooltip .tt-address { color: #aaa; margin-bottom: 4px; line-height: 1.4; }
  #tooltip .tt-capacity { color: #888; font-size: 0.75rem; margin-bottom: 4px; }
  #tooltip .tt-blurb { color: #999; font-size: 0.75rem; line-height: 1.5; margin-bottom: 6px; }
  #tooltip .tt-count { color: #ff7a00; font-size: 0.75rem; }

  /* ARTIST CARD */
  #artist-card {
    position: fixed;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.8rem;
    width: 300px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    gap: 12px;
    align-items: flex-start;
  }

  #artist-card.has-image { display: flex; }
  #artist-card.no-image  { display: block; }

  #ac-img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: #2a2a2a;
  }

  #ac-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 3px; }
  #ac-meta { color: #888; font-size: 0.75rem; margin-bottom: 6px; }
  #ac-bio  { color: #bbb; font-size: 0.77rem; line-height: 1.5; margin-bottom: 6px; }
  #ac-links { display: flex; gap: 8px; flex-wrap: wrap; }
  #ac-links a {
    color: #ff7a00;
    font-size: 0.72rem;
    text-decoration: none;
    pointer-events: all;
  }
  #ac-links a:hover { text-decoration: underline; }

  .artists-cell { color: #888; font-size: 0.78rem; }

  .attending-cell {
    text-align: right;
    color: #666;
    font-variant-numeric: tabular-nums;
  }

  .cost-cell { color: #888; }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    font-size: 0.83rem;
  }

  .pagination button {
    background: #222;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.83rem;
  }

  .pagination button:hover:not(:disabled) { background: #2a2a2a; border-color: #555; }
  .pagination button:disabled { opacity: 0.3; cursor: default; }
  #page-info { color: #666; }

  .no-results { text-align: center; padding: 40px; color: #555; }

  #year-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }

  .year-btn {
    background: #222;
    border: 1px solid #333;
    color: #888;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    white-space: nowrap;
  }
  .year-btn:hover { border-color: #555; color: #ccc; }
  .year-btn.active { background: #ff7a00; border-color: #ff7a00; color: #000; font-weight: 700; }

  #btn-export {
    background: #222;
    border: 1px solid #333;
    color: #888;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 0.83rem;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  #btn-export:hover { border-color: #555; color: #e0e0e0; }

  #artists-chart-wrap { position: relative; height: 260px; }

  /* FEATURED ARTIST */
  #featured-artist {
    display: none;
    align-items: center;
    gap: 18px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }

  #fa-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    opacity: 0.08;
    filter: blur(12px);
    pointer-events: none;
  }

  #fa-photo {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid #ff7a00;
    position: relative;
  }

  #fa-body { flex: 1; min-width: 0; position: relative; }

  #fa-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #ff7a00;
    margin-bottom: 3px;
  }

  #fa-name {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  #fa-meta { font-size: 0.75rem; color: #888; margin-bottom: 8px; }

  #fa-bio {
    font-size: 0.78rem;
    color: #bbb;
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }

  #fa-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  #fa-count {
    font-size: 0.72rem;
    color: #ff7a00;
    font-weight: 700;
    white-space: nowrap;
  }

  #fa-links { display: flex; gap: 10px; }
  #fa-links a {
    font-size: 0.72rem;
    color: #666;
    text-decoration: none;
    transition: color 0.1s;
  }
  #fa-links a:hover { color: #ff7a00; }

  #chart, #attendance-chart, #venues-chart, #artists-chart, #parties-chart { cursor: pointer; }

  .artist-link {
    cursor: pointer;
    transition: color 0.1s;
  }
  .artist-link:hover { color: #ff7a00; }

  .artist-filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ff7a00;
    color: #000;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 8px 3px 10px;
    border-radius: 20px;
  }

  .artist-filter-badge button {
    background: none;
    border: none;
    color: #000;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <h1>Warsaw Parties</h1>
  <span>Resident Advisor · 2003–2026</span>
  <div id="total-badge">0 events</div>
</header>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-address" id="tt-address"></div>
  <div class="tt-capacity" id="tt-capacity"></div>
  <div class="tt-blurb" id="tt-blurb"></div>
  <div class="tt-count" id="tt-count"></div>
</div>

<div id="artist-card">
  <img id="ac-img" src="" alt="">
  <div id="ac-body">
    <div id="ac-name"></div>
    <div id="ac-meta"></div>
    <div id="ac-bio"></div>
    <div id="ac-links"></div>
  </div>
</div>

<div class="container">

  <!-- DATE RANGE SLIDER -->
  <div class="slider-section">
    <div class="slider-header">
      <label>Date Range</label>
      <div id="range-display"></div>
    </div>
    <div class="slider-track-wrap">
      <div class="slider-track"></div>
      <div class="slider-fill" id="slider-fill"></div>
      <input type="range" id="slider-min" min="0" step="1">
      <input type="range" id="slider-max" min="0" step="1">
    </div>
    <div class="slider-labels">
      <span id="label-min"></span>
      <span id="label-max"></span>
    </div>
    <div id="year-buttons"></div>
  </div>

  <!-- CHARTS ROW -->
  <div class="charts-row">

    <div class="chart-section">
      <div class="section-title">Events per Month</div>
      <div id="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div class="section-title">Attendance per Month</div>
      <div id="attendance-chart-wrap" style="position:relative;height:260px">
        <canvas id="attendance-chart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="section-title" style="margin:0">Top Venues</div>
          <span id="venue-filter-badge" class="artist-filter-badge" style="display:none">
            <span id="venue-filter-name"></span>
            <button id="venue-filter-clear" title="Clear filter">×</button>
          </span>
        </div>
        <div class="venues-top-ctrl">
          <label>Show top</label>
          <select id="venues-top-n">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>
      </div>
      <div id="venues-chart-wrap">
        <canvas id="venues-chart"></canvas>
      </div>
    </div>

  </div>

  <!-- TOP ARTISTS + TOP PARTIES ROW -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">

    <div class="chart-section" style="margin-bottom:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="section-title" style="margin:0">Top Artists</div>
          <span id="artist-filter-badge" class="artist-filter-badge" style="display:none">
            <span id="artist-filter-name"></span>
            <button id="artist-filter-clear" title="Clear filter">×</button>
          </span>
        </div>
        <div class="venues-top-ctrl">
          <label>Show top</label>
          <select id="artists-top-n">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>
      </div>
      <div id="featured-artist">
        <div id="fa-bg"></div>
        <img id="fa-photo" src="" alt="">
        <div id="fa-body">
          <div id="fa-label">#1 Artist</div>
          <div id="fa-name"></div>
          <div id="fa-meta"></div>
          <div id="fa-bio"></div>
          <div id="fa-footer">
            <span id="fa-count"></span>
            <div id="fa-links"></div>
          </div>
        </div>
      </div>
      <div id="artists-chart-wrap">
        <canvas id="artists-chart"></canvas>
      </div>
    </div>

    <div class="chart-section" style="margin-bottom:0">
      <div class="section-title">Top 10 Parties by Attendance</div>
      <div id="parties-chart-wrap" style="position:relative;height:280px">
        <canvas id="parties-chart"></canvas>
      </div>
    </div>

  </div>

  <!-- EVENTS TABLE -->
  <div class="events-section">
    <div class="events-header">
      <div class="section-title" style="margin:0">Events</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="btn-export">Export CSV</button>
        <input type="text" id="search" placeholder="Search title, venue, artist…">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="date">Date <span class="sort-icon">↕</span></th>
            <th data-col="time">Time</th>
            <th data-col="title">Title <span class="sort-icon">↕</span></th>
            <th data-col="venue">Venue <span class="sort-icon">↕</span></th>
            <th data-col="artists">Artists</th>
            <th data-col="attending" style="text-align:right">Attending <span class="sort-icon">↕</span></th>
            <th data-col="cost">Cost</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="no-results" id="no-results" style="display:none">No events found.</div>
    <div class="pagination">
      <button id="btn-prev">← Prev</button>
      <span id="page-info"></span>
      <button id="btn-next">Next →</button>
    </div>
  </div>

</div>

<script>
// ── Load data ──────────────────────────────────────────────────────────────
Promise.all([
  fetch('data.json').then(r => r.json()),
  fetch('artists.json').then(r => r.json()).catch(() => ({})),
  fetch('venues.json').then(r => r.json()).catch(() => ({})),
]).then(([rawData, artistsData, venuesData]) => init(rawData, artistsData, venuesData));

function init(rawData, artistsData, venuesData) {
  // Sort by date ascending
  rawData.sort((a, b) => a.date.localeCompare(b.date));

  // Build venue stats map
  const venueStats = {};
  rawData.forEach(e => {
    if (!e.venue_id) return;
    if (!venueStats[e.venue_id]) {
      venueStats[e.venue_id] = { name: e.venue_name, address: e.venue_address, count: 0 };
    }
    venueStats[e.venue_id].count++;
  });

  // ── Months index ──────────────────────────────────────────────────────────
  const months = buildMonths(rawData);
  const MIN_IDX = 0;
  const MAX_IDX = months.length - 1;

  // ── Slider setup ─────────────────────────────────────────────────────────
  const sliderMin = document.getElementById('slider-min');
  const sliderMax = document.getElementById('slider-max');
  const fill      = document.getElementById('slider-fill');
  const rangeLbl  = document.getElementById('range-display');
  const labelMin  = document.getElementById('label-min');
  const labelMax  = document.getElementById('label-max');

  [sliderMin, sliderMax].forEach(s => {
    s.min = MIN_IDX;
    s.max = MAX_IDX;
  });

  sliderMin.value = MIN_IDX;
  sliderMax.value = MAX_IDX;
  labelMin.textContent = months[MIN_IDX].label;
  labelMax.textContent = months[MAX_IDX].label;

  function updateFill() {
    const lo = +sliderMin.value, hi = +sliderMax.value;
    const pct = v => ((v - MIN_IDX) / (MAX_IDX - MIN_IDX)) * 100;
    fill.style.left  = pct(lo) + '%';
    fill.style.width = (pct(hi) - pct(lo)) + '%';
    rangeLbl.textContent = months[lo].label + ' – ' + months[hi].label;
  }

  updateFill();

  sliderMin.addEventListener('input', () => {
    if (+sliderMin.value > +sliderMax.value) sliderMin.value = sliderMax.value;
    activeYear = null; updateYearButtons();
    updateFill(); refresh();
  });
  sliderMax.addEventListener('input', () => {
    if (+sliderMax.value < +sliderMin.value) sliderMax.value = sliderMin.value;
    activeYear = null; updateYearButtons();
    updateFill(); refresh();
  });

  // ── Year buttons ──────────────────────────────────────────────────────────
  const yearButtonsEl = document.getElementById('year-buttons');
  const years = [...new Set(months.map(m => m.ym.slice(0, 4)))];

  years.forEach(year => {
    const btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.textContent = year;
    btn.addEventListener('click', () => {
      const lo = months.findIndex(m => m.ym.startsWith(year));
      const hi = months.reduce((acc, m, i) => m.ym.startsWith(year) ? i : acc, lo);
      sliderMin.value = lo;
      sliderMax.value = hi;
      activeYear = year;
      updateYearButtons();
      updateFill();
      refresh();
    });
    yearButtonsEl.appendChild(btn);
  });

  function updateYearButtons() {
    yearButtonsEl.querySelectorAll('.year-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === activeYear);
    });
  }

  function setMonthFilter(ym) {
    const idx = months.findIndex(m => m.ym === ym);
    if (idx === -1) return;
    sliderMin.value = idx;
    sliderMax.value = idx;
    activeYear = null;
    updateYearButtons();
    updateFill();
    currentPage = 1;
    refresh();
  }

  // ── Search ───────────────────────────────────────────────────────────────
  const searchEl = document.getElementById('search');
  searchEl.addEventListener('input', () => { currentPage = 1; refresh(); });

  // ── Sort ─────────────────────────────────────────────────────────────────
  let sortCol = 'date', sortDir = 1;
  let selectedArtist = null;
  let selectedVenue  = null;
  let activeYear = null;
  let lastFiltered = [];
  let topPartiesData = [];
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (col === sortCol) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↑' : '↓';
      currentPage = 1;
      refresh();
    });
  });

  // ── Monthly chart ─────────────────────────────────────────────────────────
  const ctx = document.getElementById('chart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#ff7a00', borderRadius: 3, borderSkipped: false }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const lo = months[+sliderMin.value].ym;
        const hi = months[+sliderMax.value].ym;
        const cm = months.filter(m => m.ym >= lo && m.ym <= hi);
        setMonthFilter(cm[elements[0].index].ym);
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} event${ctx.raw !== 1 ? 's' : ''}`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#555',
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: 36,
            font: { size: 10 }
          },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        }
      }
    }
  });

  // ── Attendance chart ──────────────────────────────────────────────────────
  const actx = document.getElementById('attendance-chart').getContext('2d');
  const attendanceChart = new Chart(actx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#ff7a00', borderRadius: 3, borderSkipped: false }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const lo = months[+sliderMin.value].ym;
        const hi = months[+sliderMax.value].ym;
        const cm = months.filter(m => m.ym >= lo && m.ym <= hi);
        setMonthFilter(cm[elements[0].index].ym);
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw.toLocaleString()} attending`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555', maxRotation: 45, autoSkip: true, maxTicksLimit: 36, font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        }
      }
    }
  });

  // ── Venues chart ─────────────────────────────────────────────────────────
  const vctx = document.getElementById('venues-chart').getContext('2d');
  const venuesChart = new Chart(vctx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#ff7a00', borderRadius: 3, borderSkipped: false, indexAxis: 'y' }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const label = venuesChart.data.labels[elements[0].index];
        selectedVenue = selectedVenue === label ? null : label;
        currentPage = 1;
        updateVenueBadge();
        refresh();
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} event${ctx.raw !== 1 ? 's' : ''}`,
            afterLabel: ctx => {
              const name = ctx.label;
              const entry = Object.values(venueStats).find(v => v.name === name);
              return entry?.address ? entry.address : '';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#ccc', font: { size: 11 }, autoSkip: false },
          grid: { color: '#1e1e1e' }
        }
      }
    }
  });

  const topNSelect = document.getElementById('venues-top-n');
  topNSelect.addEventListener('change', refresh);

  const venueFilterBadge = document.getElementById('venue-filter-badge');
  const venueFilterName  = document.getElementById('venue-filter-name');
  document.getElementById('venue-filter-clear').addEventListener('click', () => {
    selectedVenue = null;
    currentPage = 1;
    updateVenueBadge();
    refresh();
  });

  function updateVenueBadge() {
    if (selectedVenue) {
      venueFilterName.textContent = selectedVenue;
      venueFilterBadge.style.display = 'inline-flex';
    } else {
      venueFilterBadge.style.display = 'none';
    }
  }

  // ── Artists chart ─────────────────────────────────────────────────────────
  const arctx = document.getElementById('artists-chart').getContext('2d');
  const artistsChart = new Chart(arctx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#ff7a00', borderRadius: 3, borderSkipped: false, indexAxis: 'y' }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const label = artistsChart.data.labels[elements[0].index];
        selectedArtist = selectedArtist === label ? null : label;
        currentPage = 1;
        updateArtistBadge();
        refresh();
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} event${ctx.raw !== 1 ? 's' : ''}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#ccc', font: { size: 11 }, autoSkip: false },
          grid: { color: '#1e1e1e' }
        }
      }
    }
  });

  const artistsTopNSelect = document.getElementById('artists-top-n');
  artistsTopNSelect.addEventListener('change', refresh);

  // ── Top Parties chart ─────────────────────────────────────────────────────
  const pctx = document.getElementById('parties-chart').getContext('2d');
  const partiesChart = new Chart(pctx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#ff7a00', borderRadius: 3, borderSkipped: false, indexAxis: 'y' }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const e = topPartiesData[elements[0].index];
        if (e) setMonthFilter(e.date.slice(0, 7));
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw.toLocaleString()} attending`,
            afterLabel: ctx => {
              const e = topPartiesData[ctx.dataIndex];
              return e ? `${e.date}  ·  ${e.venue_name}` : '';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#555', font: { size: 10 } },
          grid: { color: '#1e1e1e' }
        },
        y: {
          ticks: { color: '#ccc', font: { size: 11 }, autoSkip: false },
          grid: { color: '#1e1e1e' }
        }
      }
    }
  });

  const artistFilterBadge = document.getElementById('artist-filter-badge');
  const artistFilterName  = document.getElementById('artist-filter-name');
  document.getElementById('artist-filter-clear').addEventListener('click', () => {
    selectedArtist = null;
    currentPage = 1;
    updateArtistBadge();
    refresh();
  });

  function updateArtistBadge() {
    if (selectedArtist) {
      artistFilterName.textContent = selectedArtist;
      artistFilterBadge.style.display = 'inline-flex';
    } else {
      artistFilterBadge.style.display = 'none';
    }
  }

  // ── CSV export ───────────────────────────────────────────────────────────
  document.getElementById('btn-export').addEventListener('click', () => {
    const cols = ['date', 'time', 'title', 'url', 'venue', 'address', 'artists', 'attending', 'cost'];
    const rows = lastFiltered.map(e => [
      e.date,
      e.start ? `${e.start}${e.end ? '–' + e.end : ''}` : '',
      e.title,
      e.url,
      e.venue_name,
      e.venue_address,
      e.artists.join('; '),
      e.attending || '',
      e.cost
    ].map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(','));

    const csv = [cols.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `warsaw-ra-events.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // ── Pagination ────────────────────────────────────────────────────────────
  const PAGE_SIZE = 50;
  let currentPage = 1;
  document.getElementById('btn-prev').addEventListener('click', () => { currentPage--; refresh(); });
  document.getElementById('btn-next').addEventListener('click', () => { currentPage++; refresh(); });

  // ── Tooltip ───────────────────────────────────────────────────────────────
  const tooltip    = document.getElementById('tooltip');
  const ttName     = document.getElementById('tt-name');
  const ttAddress  = document.getElementById('tt-address');
  const ttCapacity = document.getElementById('tt-capacity');
  const ttBlurb    = document.getElementById('tt-blurb');
  const ttCount    = document.getElementById('tt-count');

  const artistCard = document.getElementById('artist-card');
  const acImg      = document.getElementById('ac-img');
  const acName     = document.getElementById('ac-name');
  const acMeta     = document.getElementById('ac-meta');
  const acBio      = document.getElementById('ac-bio');
  const acLinks    = document.getElementById('ac-links');

  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'block') {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    }
    if (artistCard.style.display !== 'none') {
      artistCard.style.left = (e.clientX + 14) + 'px';
      artistCard.style.top  = (e.clientY - 10) + 'px';
    }
  });

  function showTooltip(venueId) {
    const v  = venueStats[venueId];
    const vd = venuesData[venueId];
    if (!v) return;
    ttName.textContent = v.name;
    ttAddress.textContent = v.address || 'Address unknown';
    if (vd?.capacity) {
      ttCapacity.textContent = `Capacity: ${vd.capacity}`;
      ttCapacity.style.display = 'block';
    } else {
      ttCapacity.style.display = 'none';
    }
    const blurb = vd?.blurb ? stripHtml(vd.blurb) : '';
    if (blurb) {
      ttBlurb.textContent = blurb.length > 140 ? blurb.slice(0, 140) + '…' : blurb;
      ttBlurb.style.display = 'block';
    } else {
      ttBlurb.style.display = 'none';
    }
    ttCount.textContent = `${v.count} events on RA`;
    tooltip.style.display = 'block';
  }

  function hideTooltip() {
    tooltip.style.display = 'none';
  }

  function showArtistCard(name) {
    const a = artistsData[name];
    if (!a || !a.name) return;
    acName.textContent = a.name;
    acMeta.textContent = [a.country, a.area].filter(Boolean).join(' · ');
    acBio.textContent  = a.bioBlurb ? (a.bioBlurb.length > 160 ? a.bioBlurb.slice(0, 160) + '…' : a.bioBlurb) : '';

    const links = [];
    if (a.contentUrl) links.push(`<a href="https://ra.co${a.contentUrl}" target="_blank" rel="noopener">RA</a>`);
    if (a.instagram)  links.push(`<a href="${a.instagram}"  target="_blank" rel="noopener">Instagram</a>`);
    if (a.soundcloud) links.push(`<a href="${a.soundcloud}" target="_blank" rel="noopener">SoundCloud</a>`);
    if (a.facebook)   links.push(`<a href="${a.facebook}"   target="_blank" rel="noopener">Facebook</a>`);
    if (a.website)    links.push(`<a href="${a.website}"    target="_blank" rel="noopener">Website</a>`);
    acLinks.innerHTML = links.join('');

    if (a.image) {
      acImg.src = a.image;
      acImg.style.display = 'block';
      artistCard.className = 'has-image';
    } else {
      acImg.style.display = 'none';
      artistCard.className = 'no-image';
    }
    artistCard.style.display = a.image ? 'flex' : 'block';
  }

  function hideArtistCard() {
    artistCard.style.display = 'none';
  }

  // ── Main refresh ─────────────────────────────────────────────────────────
  function refresh() {
    const lo = months[+sliderMin.value].ym;
    const hi = months[+sliderMax.value].ym;
    const q  = searchEl.value.trim().toLowerCase();

    // Filter
    let filtered = rawData.filter(e => {
      const ym = e.date.slice(0, 7);
      if (ym < lo || ym > hi) return false;
      if (q) {
        const haystack = [e.title, e.venue_name, ...e.artists].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (selectedArtist) {
        const sel = selectedArtist.toLowerCase();
        if (!e.artists.some(a => a.toLowerCase() === sel)) return false;
      }
      if (selectedVenue && e.venue_name !== selectedVenue) return false;
      return true;
    });

    // Sort
    filtered.sort((a, b) => {
      let av, bv;
      if (sortCol === 'date')     { av = a.date; bv = b.date; }
      else if (sortCol === 'title')    { av = a.title.toLowerCase(); bv = b.title.toLowerCase(); }
      else if (sortCol === 'venue')    { av = a.venue_name.toLowerCase(); bv = b.venue_name.toLowerCase(); }
      else if (sortCol === 'attending'){ av = a.attending; bv = b.attending; }
      else return 0;
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });

    // Snapshot for CSV export
    lastFiltered = filtered;

    // Badge
    document.getElementById('total-badge').textContent = `${filtered.length.toLocaleString()} events`;

    // Chart — count by month within range
    const monthCounts = {};
    filtered.forEach(e => {
      const ym = e.date.slice(0, 7);
      monthCounts[ym] = (monthCounts[ym] || 0) + 1;
    });

    const chartMonths = months.filter(m => m.ym >= lo && m.ym <= hi);
    chart.data.labels   = chartMonths.map(m => m.label);
    chart.data.datasets[0].data = chartMonths.map(m => monthCounts[m.ym] || 0);
    chart.update('none');

    // Attendance chart — sum attending per month
    const attendanceCounts = {};
    filtered.forEach(e => {
      if (!e.attending) return;
      const ym = e.date.slice(0, 7);
      attendanceCounts[ym] = (attendanceCounts[ym] || 0) + e.attending;
    });
    attendanceChart.data.labels = chartMonths.map(m => m.label);
    attendanceChart.data.datasets[0].data = chartMonths.map(m => attendanceCounts[m.ym] || 0);
    attendanceChart.update('none');

    // Venues chart — count by venue within filtered set
    const venueCounts = {};
    filtered.forEach(e => {
      if (!e.venue_name) return;
      venueCounts[e.venue_name] = (venueCounts[e.venue_name] || 0) + 1;
    });
    const topN = +topNSelect.value;
    const topVenues = Object.entries(venueCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, topN);

    // Resize canvas container to fit N bars
    document.getElementById('venues-chart-wrap').style.height =
      Math.max(160, topVenues.length * 28) + 'px';

    venuesChart.data.labels = topVenues.map(v => v[0]);
    venuesChart.data.datasets[0].data = topVenues.map(v => v[1]);
    venuesChart.resize();
    venuesChart.update('none');

    // Artists chart — count by artist within filtered set
    const artistCounts = {};
    filtered.forEach(e => {
      e.artists.forEach(a => {
        if (!a) return;
        artistCounts[a] = (artistCounts[a] || 0) + 1;
      });
    });
    const topNA = +artistsTopNSelect.value;
    const topArtists = Object.entries(artistCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, topNA);

    document.getElementById('artists-chart-wrap').style.height =
      Math.max(160, topArtists.length * 28) + 'px';

    artistsChart.data.labels = topArtists.map(a => a[0]);
    artistsChart.data.datasets[0].data = topArtists.map(a => a[1]);
    artistsChart.data.datasets[0].backgroundColor = topArtists.map(a =>
      selectedArtist && a[0] === selectedArtist ? '#fff' : '#ff7a00'
    );
    artistsChart.resize();
    artistsChart.update('none');

    // Featured artist card — top 1 artist with RA profile
    const faEl    = document.getElementById('featured-artist');
    const top1    = topArtists.find(([name]) => artistsData[name]?.image);
    if (top1) {
      const [name, count] = top1;
      const a = artistsData[name];
      document.getElementById('fa-bg').style.backgroundImage = `url('${a.image}')`;
      document.getElementById('fa-photo').src = a.image;
      document.getElementById('fa-name').textContent = a.name || name;
      document.getElementById('fa-meta').textContent =
        [a.country, a.area, a.followerCount ? a.followerCount.toLocaleString() + ' followers' : '']
          .filter(Boolean).join(' · ');
      document.getElementById('fa-bio').textContent = a.bioBlurb || '';
      document.getElementById('fa-count').textContent = `${count} events`;
      const links = [];
      if (a.contentUrl) links.push(`<a href="https://ra.co${a.contentUrl}" target="_blank" rel="noopener">RA ↗</a>`);
      if (a.instagram)  links.push(`<a href="${a.instagram}"  target="_blank" rel="noopener">Instagram</a>`);
      if (a.soundcloud) links.push(`<a href="${a.soundcloud}" target="_blank" rel="noopener">SoundCloud</a>`);
      if (a.facebook)   links.push(`<a href="${a.facebook}"   target="_blank" rel="noopener">Facebook</a>`);
      if (a.website)    links.push(`<a href="${a.website}"    target="_blank" rel="noopener">Website</a>`);
      document.getElementById('fa-links').innerHTML = links.join('');
      faEl.style.display = 'flex';
    } else {
      faEl.style.display = 'none';
    }

    // Top Parties chart — top 10 events by attendance
    topPartiesData = filtered
      .filter(e => e.attending > 0)
      .sort((a, b) => b.attending - a.attending)
      .slice(0, 10);

    document.getElementById('parties-chart-wrap').style.height =
      Math.max(160, topPartiesData.length * 28) + 'px';

    partiesChart.data.labels = topPartiesData.map(e => e.title);
    partiesChart.data.datasets[0].data = topPartiesData.map(e => e.attending);
    partiesChart.resize();
    partiesChart.update('none');

    // Pagination
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    document.getElementById('page-info').textContent =
      `Page ${currentPage} of ${totalPages}`;
    document.getElementById('btn-prev').disabled = currentPage <= 1;
    document.getElementById('btn-next').disabled = currentPage >= totalPages;

    // Table
    const tbody = document.getElementById('table-body');
    document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';

    tbody.innerHTML = '';
    slice.forEach(e => {
      const tr = document.createElement('tr');

      const timeStr = e.start ? `${e.start}${e.end ? '–' + e.end : ''}` : '';

      const venueHtml = e.venue_id
        ? `<span class="venue-name" data-vid="${e.venue_id}">${esc(e.venue_name)}</span>`
        : esc(e.venue_name);

      tr.innerHTML = `
        <td class="date-col">${e.date}</td>
        <td class="time-col">${timeStr}</td>
        <td><a href="${e.url}" target="_blank" rel="noopener">${esc(e.title)}</a></td>
        <td><div class="venue-cell">${venueHtml}</div></td>
        <td class="artists-cell">${e.artists.slice(0, 4).map(a => `<span class="artist-link" data-artist="${esc(a)}">${esc(a)}</span>`).join(', ')}</td>
        <td class="attending-cell">${e.attending || ''}</td>
        <td class="cost-cell">${esc(e.cost)}</td>
      `;
      tbody.appendChild(tr);
    });

    // Re-attach tooltip events
    tbody.querySelectorAll('.venue-name[data-vid]').forEach(el => {
      el.addEventListener('mouseenter', () => showTooltip(el.dataset.vid));
      el.addEventListener('mouseleave', hideTooltip);
    });

    // Artist name click → filter; hover → profile card
    tbody.querySelectorAll('.artist-link').forEach(el => {
      el.addEventListener('click', () => {
        const artist = el.dataset.artist;
        selectedArtist = selectedArtist === artist ? null : artist;
        currentPage = 1;
        updateArtistBadge();
        refresh();
      });
      el.addEventListener('mouseenter', () => showArtistCard(el.dataset.artist));
      el.addEventListener('mouseleave', hideArtistCard);
    });
  }

  refresh();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function buildMonths(data) {
  const set = new Set(data.map(e => e.date.slice(0, 7)));
  const yms = [...set].sort();
  const first = yms[0], last = yms[yms.length - 1];
  const result = [];
  let [y, m] = first.split('-').map(Number);
  const [ey, em] = last.split('-').map(Number);
  while (y < ey || (y === ey && m <= em)) {
    const ym = `${y}-${String(m).padStart(2, '0')}`;
    result.push({
      ym,
      label: new Date(y, m - 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })
    });
    m++;
    if (m > 12) { m = 1; y++; }
  }
  return result;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function stripHtml(html) {
  return html ? html.replace(/<[^>]+>/g, '') : '';
}
